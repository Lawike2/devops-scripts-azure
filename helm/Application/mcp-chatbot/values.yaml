# ------------------------------------------------------------------------------
# General
# ------------------------------------------------------------------------------
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# ------------------------------------------------------------------------------
# Image
# ------------------------------------------------------------------------------
image:
  repository: elumole22/mcp-chatbot
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ------------------------------------------------------------------------------
# Service Account
# ------------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ------------------------------------------------------------------------------
# Pod metadata
# ------------------------------------------------------------------------------
podAnnotations: {}
podLabels: {}

# ------------------------------------------------------------------------------
# Security contexts
# ------------------------------------------------------------------------------
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # Streamlit writes tmp files at runtime
  capabilities:
    drop:
      - ALL

# ------------------------------------------------------------------------------
# Service
# ------------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8501
  targetPort: 8501

# ------------------------------------------------------------------------------
# Ingress
# ------------------------------------------------------------------------------
ingress:
  enabled: true
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: mcp-chatbot.local
      paths:
        - path: /
          pathType: Prefix
  tls: []
  # - secretName: mcp-chatbot-tls
  #   hosts:
  #     - mcp-chatbot.example.com

# ------------------------------------------------------------------------------
# Resources
# ------------------------------------------------------------------------------
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# ------------------------------------------------------------------------------
# Health probes
# Streamlit exposes a /_stcore/health endpoint
# ------------------------------------------------------------------------------
livenessProbe:
  enabled: true
  path: /_stcore/health
  initialDelaySeconds: 15
  periodSeconds: 30
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  enabled: true
  path: /_stcore/health
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# ------------------------------------------------------------------------------
# Application config
# ------------------------------------------------------------------------------
mcpServerUrl: "http://mcp-server.mcp-server.svc.cluster.local:8080"

# Pass OPENAI_API_KEY however suits your setup — plain value, secretKeyRef,
# Azure Key Vault CSI, or any other valueFrom source.
# Examples:
#
# Plain value (dev / local testing):
#   env:
#     - name: OPENAI_API_KEY
#       value: "sk-..."
#
# Kubernetes Secret:
#   env:
#     - name: OPENAI_API_KEY
#       valueFrom:
#         secretKeyRef:
#           name: mcp-chatbot-secrets
#           key: OPENAI_API_KEY
#
# Azure Key Vault (CSI driver — mounts secret as env var via SecretProviderClass):
#   env:
#     - name: OPENAI_API_KEY
#       valueFrom:
#         secretKeyRef:
#           name: mcp-chatbot-akv-sync   # synced by the CSI driver
#           key: OPENAI_API_KEY
env:
  - name: OPENAI_API_KEY
    value: "replace-me"

# ------------------------------------------------------------------------------
# Scheduling
# ------------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
