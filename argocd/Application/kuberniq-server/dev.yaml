apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kuberniq-server-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/oluwaTG/kuberniq'
    targetRevision: main
    path: ./helm/Application/kuberniq-server
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: kuberniq-server-dev
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
